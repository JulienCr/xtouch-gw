<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Camera Reset</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="sdpi-wrapper">
    <!-- Server Address -->
    <div class="sdpi-item">
      <div class="sdpi-item-label">Server</div>
      <div class="sdpi-item-value">
        <input type="text" id="serverAddress" placeholder="localhost:8125">
      </div>
    </div>

    <!-- Camera -->
    <div class="sdpi-item">
      <div class="sdpi-item-label">Camera</div>
      <div class="sdpi-item-value">
        <select id="cameraId" disabled>
          <option value="">-- Connect to server --</option>
        </select>
      </div>
    </div>

    <!-- Reset Mode -->
    <div class="sdpi-item">
      <div class="sdpi-item-label">Reset Mode</div>
      <div class="sdpi-item-value">
        <select id="resetMode">
          <option value="both" selected>Position & Zoom</option>
          <option value="position">Position Only</option>
          <option value="zoom">Zoom Only</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Connection Status -->
    <div class="sdpi-item">
      <div class="sdpi-item-label">Status</div>
      <div class="sdpi-item-value">
        <div class="status-indicator">
          <span class="status-dot not-configured" id="statusDot"></span>
          <span class="status-text" id="statusText">Not configured</span>
        </div>
      </div>
    </div>

    <!-- Test Button -->
    <div class="sdpi-item">
      <div class="sdpi-item-label"></div>
      <div class="sdpi-item-value">
        <button id="testConnection">Test Connection</button>
      </div>
    </div>
  </div>

  <script>
    // Action-specific DOM elements
    var cameraIdSelect = document.getElementById("cameraId");
    var resetModeSelect = document.getElementById("resetMode");

    // Action-specific configuration for the shared framework
    window.piConfig = {
      defaultSettings: {
        serverAddress: "localhost:8125",
        cameraId: "",
        resetMode: "both"
      },

      buildSettingsFromPayload: function(payload) {
        return {
          serverAddress: payload.serverAddress || "localhost:8125",
          cameraId: payload.cameraId || "",
          resetMode: payload.resetMode || "both"
        };
      },

      applySettingsToUI: function(settings) {
        document.getElementById("serverAddress").value = settings.serverAddress || "localhost:8125";
        resetModeSelect.value = settings.resetMode || "both";
        // Camera will be set after dropdown is populated
      },

      setupActionListeners: function(saveSettingsFn) {
        cameraIdSelect.addEventListener("change", function() {
          currentSettings.cameraId = this.value;
          saveSettingsFn();
        });

        resetModeSelect.addEventListener("change", function() {
          currentSettings.resetMode = this.value;
          saveSettingsFn();
        });
      },

      resetDropdowns: function() {
        cameraIdSelect.innerHTML = '<option value="">-- Connect to server --</option>';
        cameraIdSelect.disabled = true;
      },

      fetchDropdownData: async function(serverAddress) {
        if (!serverAddress) {
          setStatus("not-configured", "Not configured");
          return;
        }

        setStatus("connecting", "Connecting...");
        setDropdownLoading(cameraIdSelect, "Loading...");

        try {
          var camerasResponse = await apiFetch(serverAddress, "/api/cameras");

          if (!camerasResponse.ok) {
            throw new Error("API returned error status");
          }

          var cameras = await camerasResponse.json();

          populateCameraDropdown(cameraIdSelect, cameras);

          setStatus("connected", "Connected");

          if (currentSettings.cameraId) {
            var cameraOption = cameraIdSelect.querySelector('option[value="' + currentSettings.cameraId + '"]');
            if (cameraOption) {
              cameraIdSelect.value = currentSettings.cameraId;
            }
          }

        } catch (error) {
          console.error("Failed to fetch data:", error);
          setStatus("disconnected", "Connection failed");
          setDropdownError(cameraIdSelect, "Connection failed");
        }
      }
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>
