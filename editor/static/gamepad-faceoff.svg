<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <linearGradient id="bodyGradFaceoff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="stickGrad" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
  </defs>

  <!-- Body -->
  <path d="M 80 120 Q 80 70 160 70 L 440 70 Q 520 70 520 120 L 540 280 Q 540 340 460 340 L 380 340 Q 360 340 350 320 L 330 290 L 270 290 L 250 320 Q 240 340 220 340 L 140 340 Q 60 340 80 280 Z"
        fill="url(#bodyGradFaceoff)" stroke="#334155" stroke-width="2"/>

  <!-- Title -->
  <text x="300" y="100" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">FACEOFF PRO</text>

  <!-- D-Pad (left) -->
  <g id="gamepad1.dpad" transform="translate(165, 200)">
    <rect id="gamepad1.button.dpad_up" x="-12" y="-40" width="24" height="24" rx="3" fill="#334155" stroke="#475569"/>
    <rect id="gamepad1.button.dpad_down" x="-12" y="16" width="24" height="24" rx="3" fill="#334155" stroke="#475569"/>
    <rect id="gamepad1.button.dpad_left" x="-40" y="-12" width="24" height="24" rx="3" fill="#334155" stroke="#475569"/>
    <rect id="gamepad1.button.dpad_right" x="16" y="-12" width="24" height="24" rx="3" fill="#334155" stroke="#475569"/>
    <text x="0" y="-22" text-anchor="middle" fill="#cbd5e1">UP</text>
    <text x="0" y="34" text-anchor="middle" fill="#cbd5e1">DN</text>
    <text x="-28" y="4" text-anchor="middle" fill="#cbd5e1">L</text>
    <text x="28" y="4" text-anchor="middle" fill="#cbd5e1">R</text>
  </g>

  <!-- Left Stick -->
  <g id="gamepad1.stick.left" transform="translate(230, 260)">
    <circle r="38" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <circle id="gamepad1.axis.lx" r="26" fill="url(#stickGrad)" stroke="#1e293b"/>
    <text y="56" text-anchor="middle" fill="#94a3b8" font-size="10">LX / LY</text>
    <text id="gamepad1.button.l3" y="4" text-anchor="middle" fill="#64748b" font-size="9">L3</text>
  </g>

  <!-- Right Stick -->
  <g id="gamepad1.stick.right" transform="translate(370, 260)">
    <circle r="38" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <circle id="gamepad1.axis.rx" r="26" fill="url(#stickGrad)" stroke="#1e293b"/>
    <text y="56" text-anchor="middle" fill="#94a3b8" font-size="10">RX / RY</text>
    <text id="gamepad1.button.r3" y="4" text-anchor="middle" fill="#64748b" font-size="9">R3</text>
  </g>

  <!-- Face buttons (right) -->
  <g transform="translate(450, 200)">
    <circle id="gamepad1.button.y" cx="0" cy="-30" r="14" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
    <text x="0" y="-26" text-anchor="middle" fill="#eab308" font-weight="700">Y</text>
    <circle id="gamepad1.button.a" cx="0" cy="30" r="14" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="34" text-anchor="middle" fill="#22c55e" font-weight="700">A</text>
    <circle id="gamepad1.button.x" cx="-30" cy="0" r="14" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="-30" y="4" text-anchor="middle" fill="#3b82f6" font-weight="700">X</text>
    <circle id="gamepad1.button.b" cx="30" cy="0" r="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="30" y="4" text-anchor="middle" fill="#ef4444" font-weight="700">B</text>
  </g>

  <!-- Shoulders -->
  <rect id="gamepad1.button.lb" x="120" y="50" width="80" height="18" rx="9" fill="#334155" stroke="#475569"/>
  <text x="160" y="63" text-anchor="middle" fill="#cbd5e1" font-weight="600">LB</text>
  <rect id="gamepad1.button.rb" x="400" y="50" width="80" height="18" rx="9" fill="#334155" stroke="#475569"/>
  <text x="440" y="63" text-anchor="middle" fill="#cbd5e1" font-weight="600">RB</text>

  <!-- Triggers (axes) -->
  <rect id="gamepad1.axis.lt" x="130" y="22" width="60" height="20" rx="6" fill="#0b1220" stroke="#475569"/>
  <text x="160" y="36" text-anchor="middle" fill="#94a3b8">LT</text>
  <rect id="gamepad1.axis.rt" x="410" y="22" width="60" height="20" rx="6" fill="#0b1220" stroke="#475569"/>
  <text x="440" y="36" text-anchor="middle" fill="#94a3b8">RT</text>

  <!-- Start / Select -->
  <rect id="gamepad1.button.select" x="260" y="150" width="30" height="10" rx="5" fill="#334155"/>
  <text x="275" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">SELECT</text>
  <rect id="gamepad1.button.start" x="310" y="150" width="30" height="10" rx="5" fill="#334155"/>
  <text x="325" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">START</text>

  <!-- Footer label -->
  <text x="300" y="380" text-anchor="middle" fill="#475569" font-size="10">gamepad1 (Faceoff Pro layout)</text>
</svg>
