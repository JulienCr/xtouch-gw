<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <linearGradient id="bodyGradXbox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b3a1f"/>
      <stop offset="100%" stop-color="#052010"/>
    </linearGradient>
    <radialGradient id="stickGradX" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#052010"/>
    </radialGradient>
  </defs>

  <!-- Body (rounder than Faceoff) -->
  <path d="M 60 140 Q 60 60 180 60 L 420 60 Q 540 60 540 140 L 540 260 Q 540 340 420 340 L 360 340 Q 340 340 330 320 L 320 300 L 280 300 L 270 320 Q 260 340 240 340 L 180 340 Q 60 340 60 260 Z"
        fill="url(#bodyGradXbox)" stroke="#14532d" stroke-width="2"/>

  <text x="300" y="100" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600" letter-spacing="3">XBOX-STYLE</text>

  <!-- Left Stick (top-left, Xbox layout) -->
  <g id="gamepad1.stick.left" transform="translate(170, 180)">
    <circle r="40" fill="#04140a" stroke="#14532d" stroke-width="2"/>
    <circle id="gamepad1.axis.lx" r="28" fill="url(#stickGradX)" stroke="#052010"/>
    <text y="60" text-anchor="middle" fill="#86efac" font-size="10">LX / LY</text>
    <text id="gamepad1.button.l3" y="4" text-anchor="middle" fill="#bbf7d0" font-size="9">L3</text>
  </g>

  <!-- D-Pad (lower-left) -->
  <g id="gamepad1.dpad" transform="translate(245, 270)">
    <rect id="gamepad1.button.dpad_up" x="-10" y="-32" width="20" height="20" rx="3" fill="#0b3a1f" stroke="#14532d"/>
    <rect id="gamepad1.button.dpad_down" x="-10" y="12" width="20" height="20" rx="3" fill="#0b3a1f" stroke="#14532d"/>
    <rect id="gamepad1.button.dpad_left" x="-32" y="-10" width="20" height="20" rx="3" fill="#0b3a1f" stroke="#14532d"/>
    <rect id="gamepad1.button.dpad_right" x="12" y="-10" width="20" height="20" rx="3" fill="#0b3a1f" stroke="#14532d"/>
    <text x="0" y="-18" text-anchor="middle" fill="#bbf7d0" font-size="10">UP</text>
    <text x="0" y="28" text-anchor="middle" fill="#bbf7d0" font-size="10">DN</text>
    <text x="-22" y="4" text-anchor="middle" fill="#bbf7d0" font-size="10">L</text>
    <text x="22" y="4" text-anchor="middle" fill="#bbf7d0" font-size="10">R</text>
  </g>

  <!-- Right Stick (lower-right) -->
  <g id="gamepad1.stick.right" transform="translate(355, 270)">
    <circle r="40" fill="#04140a" stroke="#14532d" stroke-width="2"/>
    <circle id="gamepad1.axis.rx" r="28" fill="url(#stickGradX)" stroke="#052010"/>
    <text y="60" text-anchor="middle" fill="#86efac" font-size="10">RX / RY</text>
    <text id="gamepad1.button.r3" y="4" text-anchor="middle" fill="#bbf7d0" font-size="9">R3</text>
  </g>

  <!-- Face buttons (top-right) -->
  <g transform="translate(430, 180)">
    <circle id="gamepad1.button.y" cx="0" cy="-32" r="15" fill="#04140a" stroke="#eab308" stroke-width="2"/>
    <text x="0" y="-28" text-anchor="middle" fill="#eab308" font-weight="700">Y</text>
    <circle id="gamepad1.button.a" cx="0" cy="32" r="15" fill="#04140a" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="36" text-anchor="middle" fill="#22c55e" font-weight="700">A</text>
    <circle id="gamepad1.button.x" cx="-32" cy="0" r="15" fill="#04140a" stroke="#3b82f6" stroke-width="2"/>
    <text x="-32" y="4" text-anchor="middle" fill="#3b82f6" font-weight="700">X</text>
    <circle id="gamepad1.button.b" cx="32" cy="0" r="15" fill="#04140a" stroke="#ef4444" stroke-width="2"/>
    <text x="32" y="4" text-anchor="middle" fill="#ef4444" font-weight="700">B</text>
  </g>

  <!-- Shoulders -->
  <rect id="gamepad1.button.lb" x="100" y="40" width="90" height="20" rx="10" fill="#0b3a1f" stroke="#14532d"/>
  <text x="145" y="54" text-anchor="middle" fill="#bbf7d0" font-weight="600">LB</text>
  <rect id="gamepad1.button.rb" x="410" y="40" width="90" height="20" rx="10" fill="#0b3a1f" stroke="#14532d"/>
  <text x="455" y="54" text-anchor="middle" fill="#bbf7d0" font-weight="600">RB</text>

  <!-- Triggers -->
  <rect id="gamepad1.axis.lt" x="115" y="14" width="60" height="20" rx="6" fill="#04140a" stroke="#14532d"/>
  <text x="145" y="28" text-anchor="middle" fill="#86efac">LT</text>
  <rect id="gamepad1.axis.rt" x="425" y="14" width="60" height="20" rx="6" fill="#04140a" stroke="#14532d"/>
  <text x="455" y="28" text-anchor="middle" fill="#86efac">RT</text>

  <!-- Start / Select / Guide -->
  <circle id="gamepad1.button.guide" cx="300" cy="160" r="12" fill="#04140a" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="164" text-anchor="middle" fill="#22c55e" font-size="10">G</text>
  <rect id="gamepad1.button.select" x="248" y="155" width="32" height="10" rx="5" fill="#0b3a1f"/>
  <text x="264" y="153" text-anchor="middle" fill="#86efac" font-size="9">VIEW</text>
  <rect id="gamepad1.button.start" x="320" y="155" width="32" height="10" rx="5" fill="#0b3a1f"/>
  <text x="336" y="153" text-anchor="middle" fill="#86efac" font-size="9">MENU</text>

  <text x="300" y="380" text-anchor="middle" fill="#475569" font-size="10">gamepad1 (Xbox layout)</text>
</svg>
